      properties:
        voice_id:
          type: string
        voice_url:
          type: string
        voice_description:
          type: string
        source:
          type: string
    StorageUploadOnceForm:
      type: object
      description: 通用文件上传表单
      properties:
        data:
          type: string
          format: binary
          description: 上传的文件
        json:
          type: string
          description: |
            JSON 字符串，字段如下：
            - `busstype` (string, 必填): 业务类型
            - `storagetype` (int, 可选): 存储类型，1=大文件上传，其他=普通上传
            - `action` (int, 可选): 操作类型
            - `h_src` (int, 可选): 来源
            - `h_lc` (string, 可选): 语言代码
          example: '{"busstype":"avatar","storagetype":0}'
      required:
        - data
        - json
    StorageUploadOncePicForm:
      type: object
      description: 图片上传表单
      properties:
        data:
          type: string
          format: binary
          description: 上传的图片文件
        json:
          type: string
          description: |
            JSON 字符串，字段如下：
            - `busstype` (string, 必填): 业务类型
            - `h_src` (int, 可选): 来源
            - `h_lc` (string, 可选): 语言代码
          example: '{"busstype":"avatar"}'
      required:
        - data
        - json
    StorageUploadOnceAudioForm:
      type: object
      description: 音频上传表单（不转码）
      properties:
        data:
          type: string
          format: binary
          description: 上传的音频文件
        json:
          type: string
          description: |
            JSON 字符串，字段如下：
            - `busstype` (string, 必填): 业务类型
            - `format` (string, 可选): 音频格式
            - `trans_format` (int, 可选): 转码格式
            - `h_src` (int, 可选): 来源
            - `h_lc` (string, 可选): 语言代码
          example: '{"busstype":"voice","format":"mp3"}'
      required:
        - data
        - json
    StorageUploadData:
      type: object
      description: 文件/音频上传成功返回数据
      properties:
        uri:
          type: string
          description: 文件 URI
        md5:
          type: string
          description: 文件 MD5
        url:
          type: string
          description: 文件访问 URL
        meta:
          type: object
          description: 媒体元信息（可选）
    StorageUploadPicData:
      type: object
      description: 图片上传成功返回数据（原图 + 缩略图）
      properties:
        origin:
          type: object
          description: 原图信息
          properties:
            url:
              type: string
            md5:
              type: string
            w:
              type: integer
              description: 宽度（像素）
            h:
              type: integer
              description: 高度（像素）
        tiny:
          type: object
          description: 缩略图信息（400×400 自适应裁剪）
          properties:
            url:
              type: string
            md5:
              type: string
            w:
              type: integer
              description: 宽度（像素）
            h:
              type: integer
              description: 高度（像素）
    ApiStorageUploadOnceResp:
      type: object
      description: 文件/音频上传响应
