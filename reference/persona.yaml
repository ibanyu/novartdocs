          type: string
        duration:
          type: integer
          format: int32
          description: 在源视频末尾追加的秒数；取值范围按 model 而定。
        model:
          type: string
          enum:
            - veo-3.1
            - kling-3.0
            - grok
            - seedance-2.0
            - happyhorse-1.0
        ratio:
          type: string
          enum:
            - '16:9'
            - '9:16'
            - '1:1'
            - '4:3'
            - '3:4'
        resolution:
          type: string
          enum:
            - 720p
            - 1080p
            - 4k
        callback_id:
          type: string
          description: 自定义追踪 ID，webhook URL 后台配置
        idempotency_key:
          type: string
